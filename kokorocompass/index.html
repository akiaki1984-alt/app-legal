<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="index,follow" />
  <title>こころのコンパス | Legal &amp; Support</title>
  <meta name="description" content="iOSアプリ「こころのコンパス」の法務・サポートページ" />
  <style>
    :root {
      color-scheme: light dark;
      --fg: #1c2433;
      --bg: #f5f6fb;
      --muted: #5a6173;
      --accent: #4a5db0;
      --border: #e0e3f0;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --fg: #e8eaf5;
        --bg: #0a0c16;
        --muted: #9aa0bf;
        --accent: #8fa0ff;
        --border: #20243a;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", system-ui, sans-serif;
      color: var(--fg);
      background: var(--bg);
      line-height: 1.75;
      font-size: 16px;
    }
    main { max-width: 680px; margin: 0 auto; padding: 56px 24px 96px; }
    h1 { font-size: 2rem; margin: 0 0 8px; letter-spacing: 0.02em; }
    p { color: var(--muted); }
    ul { list-style: none; padding: 0; margin: 32px 0 0; display: grid; gap: 12px; }
    a {
      display: block;
      padding: 16px 18px;
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(127,127,160,0.06);
    }
  </style>
</head>
<body>
  <main>
    <h1>こころのコンパス</h1>
    <p>iOSアプリ「こころのコンパス｜大切な場所を方角と距離で感じる」の法務・サポートページです。</p>
    <ul>
      <li><a href="./privacy/">プライバシーポリシー / Privacy Policy</a></li>
      <li><a href="./terms/">利用規約 / Terms of Use</a></li>
      <li><a href="./support/">サポート / Support</a></li>
    </ul>
  </main>
</body>
</html>
