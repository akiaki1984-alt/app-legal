<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="index,follow" />
  <title>静音日和 | Legal & Support</title>
  <meta name="description" content="iOSアプリ「静音日和」の法務・サポートページ" />
  <style>
    :root {
      color-scheme: light dark;
      --fg: #20211f;
      --bg: #f6f2e9;
      --muted: #657181;
      --accent: #14263d;
      --border: #ded7c9;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --fg: #f5f1e8;
        --bg: #111417;
        --muted: #aab2bd;
        --accent: #d9c183;
        --border: #30343a;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", system-ui, sans-serif;
      color: var(--fg);
      background: var(--bg);
      line-height: 1.75;
      font-size: 16px;
    }
    main { max-width: 680px; margin: 0 auto; padding: 56px 24px 96px; }
    h1 { font-family: ui-serif, "Hiragino Mincho ProN", "Yu Mincho", serif; font-size: 2rem; margin: 0 0 8px; letter-spacing: 0.02em; }
    p { color: var(--muted); }
    ul { list-style: none; padding: 0; margin: 32px 0 0; display: grid; gap: 12px; }
    a {
      display: block;
      padding: 16px 18px;
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(255,255,255,0.36);
    }
  </style>
</head>
<body>
  <main>
    <h1>静音日和</h1>
    <p>iOSアプリ「静音日和」の法務・サポートページです。</p>
    <ul>
      <li><a href="./privacy/">プライバシーポリシー / Privacy Policy</a></li>
      <li><a href="./terms/">利用規約 / Terms of Use</a></li>
      <li><a href="./support/">サポート / Support</a></li>
    </ul>
  </main>
</body>
</html>
