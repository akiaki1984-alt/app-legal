<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="index,follow" />
  <title>OFF ME | Legal & Support</title>
  <meta name="description" content="iOSアプリ「OFF ME」の法務・サポートページ" />
  <style>
    :root {
      color-scheme: light dark;
      --fg: #243640;
      --bg: #f4faf9;
      --muted: #566970;
      --accent: #2e8b86;
      --border: #dcebe9;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --fg: #e6eff1;
        --bg: #0c1416;
        --muted: #9db0b8;
        --accent: #46c7bb;
        --border: #273437;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", system-ui, sans-serif;
      color: var(--fg);
      background: var(--bg);
      line-height: 1.75;
      font-size: 16px;
    }
    main { max-width: 680px; margin: 0 auto; padding: 56px 24px 96px; }
    h1 { font-size: 2rem; margin: 0 0 8px; letter-spacing: 0.02em; }
    p { color: var(--muted); }
    ul { list-style: none; padding: 0; margin: 32px 0 0; display: grid; gap: 12px; }
    a {
      display: block;
      padding: 16px 18px;
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(255,255,255,0.36);
    }
  </style>
</head>
<body>
  <main>
    <h1>OFF ME</h1>
    <p>iOSアプリ「OFF ME｜悪習慣と距離を置く」の法務・サポートページです。</p>
    <ul>
      <li><a href="./privacy/">プライバシーポリシー / Privacy Policy</a></li>
      <li><a href="./terms/">利用規約 / Terms of Use</a></li>
      <li><a href="./support/">サポート / Support</a></li>
    </ul>
  </main>
</body>
</html>
