<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="index,follow" />
  <title>みみどく | Legal &amp; Support</title>
  <meta name="description" content="iOSアプリ「みみどく（耳で読む・耳の積読）」の法務・サポートページ" />
  <style>
    :root{
      color-scheme: light dark;
      --fg:#2b2723; --bg:#f6f1ea; --muted:#7c756c; --accent:#c9701e; --border:#e7ddce; --card:#ffffff;
    }
    @media (prefers-color-scheme: dark){
      :root{ --fg:#ece7df; --bg:#141110; --muted:#9c948a; --accent:#e8a15a; --border:#2b2620; --card:#1d1917; }
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Hiragino Sans",system-ui,sans-serif;
      background:var(--bg);color:var(--fg);line-height:1.8;padding:40px 20px}
    .wrap{max-width:680px;margin:0 auto}
    .card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:30px 26px;box-shadow:0 2px 14px rgba(0,0,0,.05)}
    h1{font-size:1.6rem;color:var(--accent);margin:0 0 6px}
    .lede{color:var(--muted);margin:0 0 22px}
    ul{list-style:none;padding:0;margin:0}
    li{border-top:1px solid var(--border)}
    li:first-child{border-top:none}
    a{display:flex;justify-content:space-between;align-items:center;gap:12px;
      text-decoration:none;color:var(--fg);padding:15px 4px;font-weight:600}
    a:hover{color:var(--accent)}
    a .sub{color:var(--muted);font-weight:400;font-size:.85rem}
    .arrow{color:var(--accent)}
    footer{color:var(--muted);font-size:.82rem;text-align:center;margin-top:22px}
    footer a{display:inline;color:var(--accent);padding:0}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>みみどく</h1>
      <p class="lede">読むものを、耳で。積んだ記事を高品質な読み上げで消化する耳の積読アプリ。法務・サポートページをご案内します。</p>
      <ul>
        <li><a href="./privacy/"><span>プライバシーポリシー<br><span class="sub">Privacy Policy</span></span><span class="arrow">→</span></a></li>
        <li><a href="./terms/"><span>利用規約<br><span class="sub">Terms of Use</span></span><span class="arrow">→</span></a></li>
        <li><a href="./support/"><span>サポート / よくある質問<br><span class="sub">Support &amp; FAQ</span></span><span class="arrow">→</span></a></li>
      </ul>
    </div>
    <footer>お問い合わせ: <a href="mailto:akiaki1984@gmail.com">akiaki1984@gmail.com</a></footer>
  </div>
</body>
</html>
