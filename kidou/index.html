<h1>軌道 <span style="font-size:1.1rem;color:#9aa0ad">Kidou</span></h1>
<p class="sub">習慣が、惑星になる。</p>
<p class="lead">続けた分だけ、ひとつの習慣が天体になり、少しずつ育って、あなただけの太陽系になっていく習慣トラッカー。責めない、急かさない。</p>
<ul>
<li>習慣＝天体。実行するたび「周回」がまわり、塵から惑星へ本物の順序で育つ</li>
<li>中心の恒星は色を選んで進化。系全体を見わたす観測日誌</li>
<li>ホーム画面ウィジェットで、その場で今日の一歩を記録</li>
<li>アカウント不要・完全オンデバイス・広告なし・追跡なし（通信は課金処理のときだけ）</li>
</ul>
