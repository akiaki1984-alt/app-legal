<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="index,follow" />
  <title>こもれび神社 | Legal &amp; Support</title>
  <meta name="description" content="iOSアプリ「こもれび神社」の法務・サポートページ" />
  <style>
    :root {
      color-scheme: light dark;
      --fg: #2c2620;
      --bg: #faf5ec;
      --muted: #6f6354;
      --accent: #b04a2f;
      --border: #e7ddcd;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --fg: #ece2d2;
        --bg: #15110b;
        --muted: #a99a86;
        --accent: #e08a6c;
        --border: #2b2318;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", system-ui, sans-serif;
      color: var(--fg);
      background: var(--bg);
      line-height: 1.75;
      font-size: 16px;
    }
    main { max-width: 680px; margin: 0 auto; padding: 56px 24px 96px; }
    h1 { font-size: 2rem; margin: 0 0 8px; letter-spacing: 0.02em; }
    p { color: var(--muted); }
    ul { list-style: none; padding: 0; margin: 32px 0 0; display: grid; gap: 12px; }
    a {
      display: block;
      padding: 16px 18px;
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(176,74,47,0.06);
    }
  </style>
</head>
<body>
  <main>
    <h1>こもれび神社</h1>
    <p>iOSアプリ「こもれび神社｜毎日の参拝・おみくじ・願いごと・お守り」の法務・サポートページです。</p>
    <ul>
      <li><a href="./privacy/">プライバシーポリシー / Privacy Policy</a></li>
      <li><a href="./terms/">利用規約 / Terms of Use</a></li>
      <li><a href="./support/">サポート / Support</a></li>
    </ul>
  </main>
</body>
</html>
