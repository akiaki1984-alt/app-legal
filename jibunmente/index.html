<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>自分メンテ</title>
<style>
  :root { --teal:#2E8E80; --ink:#22312e; --bg:#f3f7f5; }
  * { box-sizing: border-box; }
  body { margin:0; font-family:-apple-system,"Hiragino Sans",system-ui,sans-serif;
         color:var(--ink); background:var(--bg); line-height:1.8; }
  header { background:linear-gradient(135deg,#5FB9A8,#2E9486); color:#fff;
           padding:64px 24px; text-align:center; }
  header h1 { margin:0 0 8px; font-size:2rem; }
  header p { margin:0; opacity:.92; }
  main { max-width:720px; margin:0 auto; padding:40px 24px 80px; }
  .links a { display:flex; align-items:center; justify-content:space-between;
             background:#fff; border-radius:14px; padding:18px 20px; margin:12px 0;
             text-decoration:none; color:var(--ink); box-shadow:0 2px 10px rgba(0,0,0,.05); }
  .links a:hover { box-shadow:0 4px 16px rgba(0,0,0,.10); }
  .links span.arrow { color:var(--teal); }
  footer { text-align:center; color:#7a8a85; font-size:.85rem; padding:24px; }
</style>
</head>
<body>
<header>
  <h1>自分メンテ</h1>
  <p>そろそろ、整えておこう。</p>
</header>
<main>
  <div class="links">
    <a href="privacy/">プライバシーポリシー <span class="arrow">›</span></a>
    <a href="terms/">利用規約 <span class="arrow">›</span></a>
    <a href="support/">サポート <span class="arrow">›</span></a>
  </div>
</main>
<footer>© 2026 自分メンテ</footer>
</body>
</html>
