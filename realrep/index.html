<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="index,follow" />
  <title>RealRep | Legal &amp; Support</title>
  <meta name="description" content="iOSアプリ「RealRep」の法務・サポートページ" />
  <style>
    :root {
      color-scheme: light dark;
      --fg: #1a1d23;
      --bg: #f7f8f4;
      --muted: #5a6470;
      --accent: #5a7d00;
      --border: #e3e7da;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --fg: #e9eef0;
        --bg: #0d0f14;
        --muted: #9aa3ad;
        --accent: #b8f237;
        --border: #232730;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", system-ui, sans-serif;
      color: var(--fg);
      background: var(--bg);
      line-height: 1.75;
      font-size: 16px;
    }
    main { max-width: 680px; margin: 0 auto; padding: 56px 24px 96px; }
    h1 { font-size: 2rem; margin: 0 0 8px; letter-spacing: 0.02em; }
    p { color: var(--muted); }
    ul { list-style: none; padding: 0; margin: 32px 0 0; display: grid; gap: 12px; }
    a {
      display: block;
      padding: 16px 18px;
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(127,127,127,0.06);
    }
  </style>
</head>
<body>
  <main>
    <h1>RealRep</h1>
    <p>iOSアプリ「RealRep｜今日の1回を、ひとつ。」の法務・サポートページです。RealRepは、スクワットを記録してフレンドと共有するソーシャル・フィットネスアプリです。</p>
    <ul>
      <li><a href="./privacy/">プライバシーポリシー / Privacy Policy</a></li>
      <li><a href="./terms/">利用規約・コミュニティガイドライン / Terms &amp; Guidelines</a></li>
      <li><a href="./support/">サポート / Support</a></li>
    </ul>
  </main>
</body>
</html>
