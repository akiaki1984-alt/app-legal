<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="index,follow">
  <meta name="theme-color" content="#080d1d">
  <title>Night Off — Legal &amp; Support</title>
  <meta name="description" content="Night Offのプライバシーポリシー、利用規約、サポート情報">
  <style>
    :root { color-scheme: dark; --bg:#080d1d; --surface:#161e35; --text:#fff7e9; --muted:#b8bfd2; --moon:#ffd579; --line:#2a3555; }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Helvetica Neue",Arial,sans-serif; color:var(--text); background:radial-gradient(circle at 82% 10%,#283254 0 7%,transparent 28%),linear-gradient(180deg,#11182d,var(--bg) 58%); line-height:1.7; }
    main { width:min(720px,calc(100% - 40px)); margin:auto; padding:72px 0 96px; }
    .moon { width:72px; height:72px; border-radius:50%; background:var(--moon); box-shadow:0 0 54px #ffd57955; margin-bottom:28px; }
    h1 { font-size:clamp(2.6rem,10vw,4.6rem); letter-spacing:-.055em; line-height:.98; margin:0; }
    .lead { max-width:560px; color:var(--muted); font-size:1.08rem; margin:22px 0 38px; }
    nav { display:grid; gap:12px; }
    nav a { display:flex; align-items:center; justify-content:space-between; min-height:68px; padding:18px 20px; color:var(--text); text-decoration:none; font-weight:700; background:#161e35d9; border:1px solid var(--line); border-radius:18px; }
    nav a span { color:var(--moon); font-size:1.35rem; }
    footer { margin-top:48px; color:var(--muted); font-size:.85rem; }
  </style>
</head>
<body>
  <main>
    <div class="moon" aria-hidden="true"></div>
    <h1>Night Off</h1>
    <p class="lead">夜は、スクロールを終わらせる。Night Offは、選んだアプリやWebサイトを設定した夜間にシールドする、iPhone向けのデジタルウェルビーイングアプリです。</p>
    <nav aria-label="Legal and support">
      <a href="./privacy/">プライバシーポリシー / Privacy Policy <span aria-hidden="true">›</span></a>
      <a href="./terms/">利用規約 / Terms of Use <span aria-hidden="true">›</span></a>
      <a href="./support/">サポート / Support <span aria-hidden="true">›</span></a>
    </nav>
    <footer>提供者 / Provider: 青木 一成 (Kazunari Aoki) · © 2026 Night Off</footer>
  </main>
</body>
</html>
